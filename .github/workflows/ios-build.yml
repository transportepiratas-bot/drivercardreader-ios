name: iOS Build for AltStore

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Package iOS
    runs-on: macos-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'
    
    - name: Build and Archive
      run: |
        xcodebuild archive \
          -project DriverCardReader.xcodeproj \
          -scheme "DriverCardReader" \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          -archivePath $PWD/build/DriverCardReader.xcarchive \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=YES \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          DEVELOPMENT_TEAM="" \
          ARCHS=arm64 \
          SDKROOT=iphoneos
          
    - name: Create IPA
      run: |
        rm -rf build/ipa
        mkdir -p build/ipa/Payload
        # ditto avoids metadata issues and is consistent for .app bundles
        ditto build/DriverCardReader.xcarchive/Products/Applications/*.app build/ipa/Payload/$(ls build/DriverCardReader.xcarchive/Products/Applications/ | grep .app)
        
        cd build/ipa
        # Remove ad-hoc signature which can confuse AltStore
        rm -rf Payload/*.app/_CodeSignature
        
        # Use ditto for zipping as it is Apple's standard and guarantees proper structure
        ditto -c -k --sequesterRsrc --keepParent Payload ../../DriverCardReader.ipa
        
    - name: Verify IPA Structure
      run: |
        unzip -l DriverCardReader.ipa | head -n 20
        
    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: DriverCardReader-AltStore-IPA
        path: DriverCardReader.ipa
