name: iOS Build for AltStore

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Package iOS
    runs-on: macos-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'
    
    - name: Build for iOS
      run: |
        xcodebuild build \
          -project DriverCardReader.xcodeproj \
          -scheme "DriverCardReader" \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -derivedDataPath ./DerivedData \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=YES \
          AD_HOC_CODE_SIGNING_ALLOWED=YES
          
    - name: Create IPA
      run: |
        # Find the built .app
        APP_PATH=$(find ./DerivedData -name "DriverCardReader.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: App not found in DerivedData"
          find ./DerivedData -name "*.app" -type d
          exit 1
        fi
        
        echo "Found app at: $APP_PATH"
        
        # Create Payload structure
        rm -rf Payload
        mkdir -p Payload
        cp -R "$APP_PATH" Payload/
        
        # List contents to verify
        echo "Payload contents:"
        ls -la Payload/DriverCardReader.app/
        
        # Create IPA using zip (compatible with AltStore)
        zip -r DriverCardReader.ipa Payload -x "*.DS_Store"
        
    - name: Verify IPA Structure
      run: |
        echo "IPA structure:"
        unzip -l DriverCardReader.ipa | head -n 30
        echo ""
        echo "File size:"
        ls -lh DriverCardReader.ipa
        
    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: DriverCardReader-AltStore-IPA
        path: DriverCardReader.ipa

