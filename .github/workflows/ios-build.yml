name: iOS Build for AltStore

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Package iOS
    runs-on: macos-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'
    
    - name: Create Self-Signed Certificate
      run: |
        # Generate a self-signed certificate
        openssl req -new -x509 -days 365 -nodes \
          -subj "/CN=DriverCardReader/O=DriverCardReader/C=ES" \
          -keyout private.key -out certificate.cer \
          -newkey rsa:2048
        
        # Create a P12 file
        openssl pkcs12 -export \
          -in certificate.cer -inkey private.key \
          -out certificate.p12 -password pass:
        
        # Import the certificate into the login keychain
        security import certificate.p12 \
          -k ~/Library/Keychains/login.keychain-db -P "" -T /usr/bin/codesign
        
    - name: Build and Archive
      run: |
        xcodebuild archive \
          -project DriverCardReader.xcodeproj \
          -scheme "DriverCardReader" \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          -archivePath $PWD/build/DriverCardReader.xcarchive \
          CODE_SIGN_IDENTITY="DriverCardReader" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=YES \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          DEVELOPMENT_TEAM="" \
          ARCHS=arm64 \
          SDKROOT=iphoneos
          
    - name: Create IPA
      run: |
        rm -rf build/ipa
        mkdir -p build/ipa/Payload
        
        # Find the app
        APP_PATH=$(find build/DriverCardReader.xcarchive -name "*.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: App not found in archive"
          exit 1
        fi
        
        echo "Found app at: $APP_PATH"
        echo "App contents:"
        ls -la "$APP_PATH/"
        
        # Copy app to Payload
        ditto "$APP_PATH" "build/ipa/Payload/DriverCardReader.app"
        
        echo "Final Payload contents:"
        ls -la "build/ipa/Payload/DriverCardReader.app/"
        
        # Create IPA
        cd build/ipa
        ditto -c -k --sequesterRsrc --keepParent Payload ../../DriverCardReader.ipa
        cd ../..
        
    - name: Verify IPA Structure
      run: |
        echo "IPA structure:"
        unzip -l DriverCardReader.ipa
        echo ""
        echo "Checking for embedded.mobileprovision:"
        unzip -l DriverCardReader.ipa | grep -i provision || echo "NOT FOUND"
        
    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: DriverCardReader-AltStore-IPA
        path: DriverCardReader.ipa
